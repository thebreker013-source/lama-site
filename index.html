<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gender Select</title>
<style>
    body {
        font-family: Arial;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #111;
    }

    .box {
        background: #eee;
        padding: 20px;
        border-radius: 8px;
        width: 200px;
    }

    h2 {
        margin-bottom: 10px;
    }

    select {
        width: 100%;
        padding: 10px;
        font-size: 16px;
    }
</style>
</head>
<body>

<div class="box">
    <h2>Gender:</h2>
    <select>
        <option>Female</option>
        <option>Female</option>
        <option>Male</option>
        <option selected>lama</option>
    </select>
</div>

</body>
</html>
