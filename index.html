<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Love Form</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: pink;
    background-image: url('https://i.imgur.com/8Qf6h6F.png');
    background-size: cover;
}

.top-text {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 20px;
    color: #a1005b;
}

.container {
    width: 400px;
    margin: 100px auto;
    background: rgba(255,255,255,0.8);
    padding: 20px;
    border-radius: 15px;
}

h2 {
    text-align: center;
    color: #ff4da6;
}

label {
    display: block;
    margin-top: 10px;
}

input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
</style>

</head>
<body>

<div class="top-text">from your love mdmd</div>

<div class="container">
    <h2>Love Form 💖</h2>

    <label>Name:</label>
    <input type="text">

    <label>Birthdate:</label>
    <input type="date">

    <label>Phone Number:</label>
    <input type="text">

    <label>Gender:</label>
    <select>
        <option>Female</option>
        <option>Female</option>
        <option>Male</option>
        <option selected>lama</option>
    </select>

</div>

</body>
</html>
